name = "voice-clone"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
workers_dev = true

routes = [
  # Replace with your own custom domains before deploying.
  # { pattern = "voice.example.com", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "voice-clone-db"
database_id = "replace-with-your-d1-database-id"

[[r2_buckets]]
binding = "R2"
bucket_name = "voice-clone-audio"

[assets]
directory = ".open-next/assets"
